name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e # Stop the script immediately if any command fails

            # 1. Go to project directory
            cd /home/arslan/86NOCConnectorCenter

            # 2. Pull latest changes (hard reset to match remote)
            echo "Pulling latest code from main branch..."
            git fetch origin main
            git reset --hard origin/main

            # 3. Build Frontend
            echo "Building frontend..."
            cd frontend
            npm install
            npm run build
            cd ..

            # 4. Update Backend
            echo "Installing backend dependencies..."
            cd backend
            # Use the existing virtual environment pip
            /home/arslan/86NOCConnectorCenter/backend/venv/bin/pip install -r requirements.txt
            cd ..

            # 5. Restart Backend Server
            echo "Restarting backend service..."
            # Assuming you will set up a systemd service named 'noc-backend' as described in the deployment guide
            sudo systemctl restart noc-backend
            
            echo "Deployment Complete!"
