name: Release Argus Agent (Windows binaries + installer template)

# ============================================================================
# Pipeline che ricostruisce i 4 binari Windows del NOC Agent (nocagent.exe,
# nocwatchdog.exe, nocagent-ui.exe, nocinstall.exe) + il template del wizard
# PowerShell, e li pubblica come asset di una GitHub Release pronta per essere
# consumata dal NOC Center via la env BINARY_URLS_BASE.
#
# Trigger:
#   - push di un tag SemVer "v*" (es. `git tag v4.1.2 && git push --tags`)
#   - manuale dalla tab "Actions" (workflow_dispatch) — utile per ribuildare
#     senza creare un nuovo tag.
#
# Output: una Release con 5 asset:
#   - nocagent.exe
#   - nocwatchdog.exe
#   - nocagent-ui.exe
#   - nocinstall.exe
#   - installer_gui.ps1.template
#
# Il job richiede unicamente il GITHUB_TOKEN (gia' fornito dal runner).
# ============================================================================

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag della release (es. v4.1.2). Se vuoto usa il commit corrente con un tag generato.'
        required: false
        default: ''

permissions:
  contents: write   # serve per creare/aggiornare la Release

jobs:
  build-windows:
    name: Build Windows binaries (amd64)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: noc-agent

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: noc-agent/go.sum

      - name: Determine version string
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VER="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            VER="${{ inputs.tag }}"
            VER="${VER#v}"
          else
            VER="$(date -u +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "VERSION = $VER"

      - name: Build 4 Windows binaries
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p build/bin/windows-amd64
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          # nocagent.exe (servizio principale)
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o build/bin/windows-amd64/nocagent.exe ./cmd/agent
          # nocwatchdog.exe (riavvia il servizio in caso di hang/crash)
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o build/bin/windows-amd64/nocwatchdog.exe ./cmd/watchdog
          # nocagent-ui.exe (tray + console gestione device, GUI).
          # nocui usa la variabile `main.BuildVersion` (non `main.Version`)
          # per popolare il titolo finestra e l'header "ARGUS v..." quando
          # agent-ui.json non riporta la versione corrente.
          go build -trimpath -ldflags "${LDFLAGS} -X main.BuildVersion=${VERSION} -H=windowsgui" \
            -o build/bin/windows-amd64/nocagent-ui.exe ./cmd/nocui
          # nocinstall.exe (installer CLI standalone)
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o build/bin/windows-amd64/nocinstall.exe ./cmd/installer
          ls -lh build/bin/windows-amd64/

      - name: Compute SHA256 sums
        working-directory: noc-agent/build/bin/windows-amd64
        run: |
          sha256sum nocagent.exe nocwatchdog.exe nocagent-ui.exe nocinstall.exe \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Stage installer template (5th asset)
        run: |
          cp build/installer_gui.ps1.template build/bin/windows-amd64/installer_gui.ps1.template
          cp build/install-noc-agent.ps1     build/bin/windows-amd64/install-noc-agent.ps1
          ls -lh build/bin/windows-amd64/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Se il workflow e' stato lanciato manuale senza tag, creiamo
          # comunque una release "rolling" con tag generato.
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || (inputs.tag != '' && inputs.tag || format('v{0}', steps.ver.outputs.version)) }}
          name: Argus Agent ${{ steps.ver.outputs.version }}
          body: |
            ## Argus NOC Agent — release ${{ steps.ver.outputs.version }}

            Binari Windows (amd64) compilati cross-platform da GitHub Actions.

            **Asset inclusi**
            - `nocagent.exe` — servizio principale
            - `nocwatchdog.exe` — watchdog di riavvio
            - `nocagent-ui.exe` — GUI tray / console gestione device
            - `nocinstall.exe` — installer CLI standalone
            - `installer_gui.ps1.template` — template PowerShell del wizard installazione
            - `install-noc-agent.ps1` — **installer STANDALONE** (zero backend Linux, scarica direttamente da questa release)
            - `SHA256SUMS.txt` — hash SHA-256 di tutti i .exe

            **Install / update standalone (zero dipendenze backend)**
            ```powershell
            # PowerShell Administrator sul Windows del cliente
            $u = "https://github.com/${{ github.repository }}/releases/latest/download/install-noc-agent.ps1"
            iwr $u -OutFile $env:TEMP\install.ps1 -UseBasicParsing
            & $env:TEMP\install.ps1 -Token "<NOC_TOKEN>" -ClientId "<CLIENT_UUID>"
            ```

            **Come consumare**
            Sul NOC Center setta l'env `BINARY_URLS_BASE` puntando a:
            ```
            https://github.com/${{ github.repository }}/releases/download/${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.ver.outputs.version) }}
            ```
            Il backend FastAPI scaricherà sia i binari sia il template direttamente da qui.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            noc-agent/build/bin/windows-amd64/nocagent.exe
            noc-agent/build/bin/windows-amd64/nocwatchdog.exe
            noc-agent/build/bin/windows-amd64/nocagent-ui.exe
            noc-agent/build/bin/windows-amd64/nocinstall.exe
            noc-agent/build/bin/windows-amd64/installer_gui.ps1.template
            noc-agent/build/bin/windows-amd64/install-noc-agent.ps1
            noc-agent/build/bin/windows-amd64/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
