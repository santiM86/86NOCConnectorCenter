<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>NOC Center - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }
    p {
      font-size: 14px;
      color: #71717a;
      max-width: 360px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: #a1a1aa;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    button {
      margin-top: 20px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <img src="/icon-192.png" alt="NOC" class="icon" />
  <h1>Sei Offline</h1>
  <p>La connessione al NOC Command Center non e' disponibile. Controlla la tua rete e riprova.</p>
  <div class="status">
    <span class="dot"></span>
    In attesa di connessione...
  </div>
  <button onclick="window.location.reload()">Riprova</button>
  <script>
    // Auto-reload quando torna online
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
